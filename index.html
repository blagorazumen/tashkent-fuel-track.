<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бензин Ташкент</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; }
        header h1 { font-size: 22px; text-align: center; color: var(--accent); margin-bottom: 5px; }
        .update-time { font-size: 11px; text-align: center; opacity: 0.5; margin-bottom: 20px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: var(--card); color: var(--text); font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: #000; }
        .fuel-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .azn-name { font-size: 18px; font-weight: bold; display: block; }
        .azn-time { font-size: 11px; opacity: 0.5; }
        .price { font-size: 20px; font-weight: 800; color: var(--accent); }
        .report-btn { position: fixed; bottom: 20px; left: 15px; right: 15px; background: var(--accent); border: none; padding: 16px; border-radius: 12px; font-weight: bold; color: #000; }
    </style>
</head>
<body>
    <header>
        <h1>FUEL TRACKER</h1>
        <div class="update-time" id="clock">Обновлено: только что</div>
    </header>

    <div class="tabs">
        <button id="btn80" class="tab-btn active" onclick="showFuel('80')">АИ-80</button>
        <button id="btn92" class="tab-btn" onclick="showFuel('92')">АИ-92</button>
        <button id="btn95" class="tab-btn" onclick="showFuel('95')">АИ-95</button>
    </div>

    <div id="list"></div>

    <button class="report-btn" onclick="tgReport()">СООБЩИТЬ ЦЕНУ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const fuelData = {
            '80': [ {n: "UNG Petro", p: "7 000", t: "5 мин. назад"}, {n: "Mustang", p: "7 100", t: "15 мин. назад"} ],
            '92': [ {n: "UNG Petro", p: "9 500", t: "10 мин. назад"}, {n: "Sanoat", p: "9 450", t: "30 мин. назад"} ],
            '95': [ {n: "Lukoil", p: "13 500", t: "2 мин. назад"}, {n: "Mustang", p: "12 900", t: "1 час назад"} ]
        };

        function showFuel(type) {
            tg.HapticFeedback.impactOccurred('light');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + type).classList.add('active');

            const container = document.getElementById('list');
            container.innerHTML = '';
            
            fuelData[type].forEach(i => {
                container.innerHTML += `
                    <div class="fuel-card">
                        <div><span class="azn-name">${i.n}</span><span class="azn-time">${i.t}</span></div>
                        <div class="price">${i.p}</div>
                    </div>`;
            });
        }

        function tgReport() {
            tg.MainButton.setText("ОТПРАВИТЬ ДАННЫЕ").show();
            tg.showAlert("Функция отправки будет добавлена в следующей версии!");
        }

        showFuel('80');
    </script>
</body>
</html>
