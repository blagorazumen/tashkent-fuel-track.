<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fuel Tracker Tashkent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>БЕНЗИН ТАШКЕНТ</h1>
            <p id="last-update">Обновлено: сегодня, 16:20</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="filterFuel('80')">АИ-80</button>
            <button class="tab-btn" onclick="filterFuel('92')">АИ-92</button>
            <button class="tab-btn" onclick="filterFuel('95')">АИ-95</button>
        </div>

        <div id="fuel-list" class="fuel-list">
            </div>

        <button class="main-btn" onclick="reportPrice()">СООБЩИТЬ ЦЕНУ</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
