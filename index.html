<style>
    .refresh-container { text-align: center; margin-bottom: 20px; }
    .refresh-btn { 
        background: transparent; border: 1px solid var(--border-blue); 
        color: var(--border-blue); padding: 8px 20px; border-radius: 20px; 
        font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase;
    }
    /* Анимация моргания при обновлении */
    @keyframes blink {
        0% { opacity: 1; }
        50% { opacity: 0.3; }
        100% { opacity: 1; }
    }
    .updating { animation: blink 0.5s linear; }
</style>

<div class="refresh-container">
    <button class="refresh-btn" onclick="refreshData()">🔄 Обновить данные</button>
</div>

<script>
    function refreshData() {
        tg.HapticFeedback.notificationOccurred('success'); // Вибрация при успехе
        const board = document.querySelector('.fuel-scoreboard');
        board.classList.add('updating'); // Включаем моргание
        
        // Имитируем загрузку 1 секунду
        setTimeout(() => {
            board.classList.remove('updating');
            tg.showAlert("Данные успешно обновлены!");
        }, 1000);
    }
</script>
